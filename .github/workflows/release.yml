name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Build patches bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build --no-daemon

      - name: Download ReVanced CLI
        run: |
          curl -L https://github.com/ReVanced/revanced-cli/releases/download/v6.0.0/revanced-cli-6.0.0-all.jar \
            -o revanced-cli.jar

      - name: Download base GameHub APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download base-apk-600 \
            --pattern "GameHub_beta_6.0.0_global.apk" \
            --repo ${{ github.repository }} \
            --output GameHub_6.0.0.apk

      - name: Apply patches & produce variant APKs
        run: |
          set -e
          PATCHES_FILE=$(find patches/build/libs -name "*.rvp" ! -name "*-javadoc*" ! -name "*-sources*" | head -1)
          echo "Using patches file: $PATCHES_FILE"

          # Variant table: <out_filename>|<package_name>|<app_label>
          # Keep the Original entry — it preserves com.xiaoji.egggame so it
          # replaces an installed GameHub. Other variants install side-by-side.
          variants=(
            "GameHub-6.0-Patched-Normal.apk|banner.hub|GameHub"
            "GameHub-6.0-Patched-Normal(GHL).apk|gamehub.lite|GameHub"
            "GameHub-6.0-Patched-PuBG.apk|com.tencent.ig|GameHub PuBG"
            "GameHub-6.0-Patched-AnTuTu.apk|com.antutu.ABenchMark|GameHub AnTuTu"
            "GameHub-6.0-Patched-alt-AnTuTu.apk|com.antutu.benchmark.full|GameHub AnTuTu"
            "GameHub-6.0-Patched-PuBG-CrossFire.apk|com.tencent.tmgp.cf|GameHub PuBG CrossFire"
            "GameHub-6.0-Patched-Ludashi.apk|com.ludashi.aibench|GameHub Ludashi"
            "GameHub-6.0-Patched-Genshin.apk|com.miHoYo.GenshinImpact|GameHub Genshin"
            "GameHub-6.0-Patched-Original.apk|com.xiaoji.egggame|GameHub"
          )

          mkdir -p out
          for entry in "${variants[@]}"; do
            IFS='|' read -r out_name pkg label <<< "$entry"
            echo
            echo "=== Building $out_name (pkg=$pkg, label=$label) ==="
            java -jar revanced-cli.jar patch GameHub_6.0.0.apk \
              --patches "$PATCHES_FILE" \
              --bypass-verification \
              -e "Change package name" -O "packageName=$pkg" \
              -e "Change app name" -O "appName=$label" \
              --out "out/$out_name"
          done

          ls -la out/

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            out/GameHub-6.0-Patched-*.apk
            patches/build/libs/*.rvp
            extensions/extension/build/libs/**/*.rve
