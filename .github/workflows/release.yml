name: Release

on:
  push:
    tags:
      - "v*"
      - "GameHub-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0 or GameHub-6.0)"
        required: true

jobs:
  build:
    name: Build patches bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Build patches bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build --no-daemon

      - name: Download ReVanced CLI
        run: |
          curl -L https://github.com/ReVanced/revanced-cli/releases/download/v6.0.0/revanced-cli-6.0.0-all.jar \
            -o revanced-cli.jar

      - name: Download base GameHub APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download base-apk-600 \
            --pattern "GameHub_beta_6.0.0_global.apk" \
            --repo ${{ github.repository }} \
            --output GameHub_6.0.0.apk

      - name: Build AOSP testkey JKS
        run: |
          set -e
          mkdir -p keys
          # Fetch the public AOSP testkey directly from the official mirror.
          # This is a publicly-checked-in test key with no security guarantees;
          # we use it so all releases are signed with the same well-known
          # identity, making upgrades work across builds.
          curl -L -o keys/testkey.x509.pem \
            https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/testkey.x509.pem?format=TEXT
          curl -L -o keys/testkey.pk8.b64 \
            https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/testkey.pk8?format=TEXT
          base64 -d keys/testkey.x509.pem > keys/testkey.x509.pem.bin
          mv keys/testkey.x509.pem.bin keys/testkey.x509.pem
          base64 -d keys/testkey.pk8.b64 > keys/testkey.pk8
          rm keys/testkey.pk8.b64

          # Convert PK8 (DER, PKCS8 unencrypted) → PEM RSA private key
          openssl pkcs8 -in keys/testkey.pk8 -inform DER -out keys/testkey.key.pem -nocrypt
          # Combine cert + key into PKCS12, then import into JKS for revanced-cli
          openssl pkcs12 -export \
            -in keys/testkey.x509.pem \
            -inkey keys/testkey.key.pem \
            -name androiddebugkey \
            -passout pass:android \
            -out keys/testkey.p12
          keytool -importkeystore -noprompt \
            -srckeystore keys/testkey.p12 -srcstoretype PKCS12 -srcstorepass android \
            -destkeystore keys/testkey.jks -deststoretype JKS -deststorepass android

          echo "=== Testkey cert ==="
          keytool -printcert -file keys/testkey.x509.pem | head -10

      - name: Stage shared artifacts
        run: |
          mkdir -p shared
          cp revanced-cli.jar shared/
          cp GameHub_6.0.0.apk shared/
          cp keys/testkey.jks shared/
          cp $(find patches/build/libs -name "*.rvp" ! -name "*-javadoc*" ! -name "*-sources*" | head -1) shared/patches.rvp
          # Side-channel artefacts that ship in the final release
          cp patches/build/libs/*.rvp shared/ 2>/dev/null || true
          mkdir -p shared/rve
          find extensions/extension/build/libs -name "*.rve" -exec cp {} shared/rve/ \; 2>/dev/null || true

      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shared
          path: shared/
          retention-days: 1

  patch:
    name: Patch ${{ matrix.variant.name }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: Normal,         file: "GameHub-6.0-Patched-Normal.apk",          pkg: "banner.hub",                 label: "GameHub" }
          - { name: Normal-GHL,     file: "GameHub-6.0-Patched-Normal(GHL).apk",     pkg: "gamehub.lite",               label: "GameHub" }
          - { name: PuBG,           file: "GameHub-6.0-Patched-PuBG.apk",            pkg: "com.tencent.ig",             label: "GameHub PuBG" }
          - { name: AnTuTu,         file: "GameHub-6.0-Patched-AnTuTu.apk",          pkg: "com.antutu.ABenchMark",      label: "GameHub AnTuTu" }
          - { name: alt-AnTuTu,     file: "GameHub-6.0-Patched-alt-AnTuTu.apk",      pkg: "com.antutu.benchmark.full",  label: "GameHub AnTuTu" }
          - { name: PuBG-CrossFire, file: "GameHub-6.0-Patched-PuBG-CrossFire.apk",  pkg: "com.tencent.tmgp.cf",        label: "GameHub PuBG CrossFire" }
          - { name: Ludashi,        file: "GameHub-6.0-Patched-Ludashi.apk",         pkg: "com.ludashi.aibench",        label: "GameHub Ludashi" }
          - { name: Genshin,        file: "GameHub-6.0-Patched-Genshin.apk",         pkg: "com.miHoYo.GenshinImpact",   label: "GameHub Genshin" }
          - { name: Original,       file: "GameHub-6.0-Patched-Original.apk",        pkg: "com.xiaoji.egggame",         label: "GameHub" }
    steps:
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared
          path: shared/

      - name: Apply patches
        run: |
          set -e
          mkdir -p out
          # Values are wrapped in JSON-string quotes so picocli's
          # Map<String,Object> parser doesn't try to coerce them as
          # numbers (e.g. "com.tencent.tmgp.cf" — the trailing 'f' is
          # parsed as a Java float suffix and triggers NumberFormatException
          # before the patch ever runs). The quotes also make values with
          # spaces (e.g. "GameHub PuBG CrossFire") a non-issue.
          java -jar shared/revanced-cli.jar patch shared/GameHub_6.0.0.apk \
            --patches shared/patches.rvp \
            --bypass-verification \
            --keystore shared/testkey.jks \
            --keystore-password android \
            --keystore-entry-alias androiddebugkey \
            --keystore-entry-password android \
            -e "Change package name" -O 'packageName="${{ matrix.variant.pkg }}"' \
            -e "Change app name" -O 'appName="${{ matrix.variant.label }}"' \
            --out "out/${{ matrix.variant.file }}"
          ls -la "out/${{ matrix.variant.file }}"

      - name: Upload variant APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.variant.name }}
          path: out/${{ matrix.variant.file }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: patch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download shared artifacts (rvp + rve)
        uses: actions/download-artifact@v4
        with:
          name: shared
          path: shared/

      - name: Download all variant APKs
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: apks/
          merge-multiple: true

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: List release files
        run: |
          echo "=== APKs ==="
          ls -la apks/
          echo "=== rvp ==="
          ls -la shared/*.rvp 2>/dev/null || true
          echo "=== rve ==="
          ls -la shared/rve/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: GameHub 6.0 No Login
          body: |
            ## GameHub 6.0 No Login

            A patched build of XiaoJi GameHub 6.0.0 (`com.xiaoji.egggame`) that removes the login requirement so games can be imported and used without an account.

            ### Source
            - **Base APK**: `GameHub_beta_6.0.0_global.apk` — the official 6.0.0 global build
            - **Patcher**: ReVanced CLI 6.0.0 + this repo's patch bundle, branch `gamehub-600-build`
            - **Repo**: https://github.com/${{ github.repository }}

            ### Variants

            Nine APKs are produced from the same patch bundle, each with a different package name + launcher label so they install side-by-side. The `Original` variant **replaces** an installed GameHub; the rest install **alongside** the original.

            | Variant | APK | Package | Launcher label |
            | --- | --- | --- | --- |
            | Normal | `GameHub-6.0-Patched-Normal.apk` | `banner.hub` | GameHub |
            | Normal (GHL) | `GameHub-6.0-Patched-Normal(GHL).apk` | `gamehub.lite` | GameHub |
            | PuBG | `GameHub-6.0-Patched-PuBG.apk` | `com.tencent.ig` | GameHub PuBG |
            | AnTuTu | `GameHub-6.0-Patched-AnTuTu.apk` | `com.antutu.ABenchMark` | GameHub AnTuTu |
            | alt-AnTuTu | `GameHub-6.0-Patched-alt-AnTuTu.apk` | `com.antutu.benchmark.full` | GameHub AnTuTu |
            | PuBG-CrossFire | `GameHub-6.0-Patched-PuBG-CrossFire.apk` | `com.tencent.tmgp.cf` | GameHub PuBG CrossFire |
            | Ludashi | `GameHub-6.0-Patched-Ludashi.apk` | `com.ludashi.aibench` | GameHub Ludashi |
            | Genshin | `GameHub-6.0-Patched-Genshin.apk` | `com.miHoYo.GenshinImpact` | GameHub Genshin |
            | Original | `GameHub-6.0-Patched-Original.apk` | `com.xiaoji.egggame` | GameHub |

            ### Patches applied

            | Patch | What it does |
            | --- | --- |
            | **Bypass login** | Skips the login screen entirely. Patches the `g8e` navigator so the Login route is never selected, replaces `os0.h()`'s isLoggedIn StateFlow to emit `TRUE`, replaces `os0.e()`'s user-account StateFlow to emit a synthetic `f4m{user_id="99999"}` so library queries return rows, and replaces `xm7.f()` and `is0.f()` to keep the user-id consistent across the read and write code paths. Result: launches straight into the home screen; game-import saves persist to `db_game_library.db`; imported games appear in the library list. |
            | **Disable Firebase Crashlytics** | Removes the Crashlytics initialisation block in reverse instruction order so the ART verifier accepts the resulting bytecode. Without this, GameHub 6.0 crashes on launch with `VerifyError`. |
            | **Debug logging** | Sets `android:debuggable="true"` and inserts `Log.i("GH600-DEBUG", ...)` markers along the import code path (`xm7.u`, `el7.invokeSuspend`, both Room DAO inserts) plus a `Throwable` hook on the `odb.e()` global swallower. Used to triage the import flow during development; will be removed in a follow-up build once the import flow is confirmed stable. |
            | **File manager access** | Adds an exposed `MTDataFiles` content provider so external file managers can browse GameHub's data directory. |
            | **Change package name** *(per variant)* | Rewrites the APK's package name to the variant's value listed above. The `Original` variant keeps `com.xiaoji.egggame`. |
            | **Change app name** *(per variant)* | Rewrites the launcher label to the variant's value listed above. |

            ### Signing

            All APKs are signed with the **AOSP `testkey`** (V1, V2, and V3 signature schemes via `apksigner`). The testkey private key is publicly checked into the [Android Open Source Project](https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/) and intentionally has **no security guarantees** — it exists so test/personal builds can be signed reproducibly. Implications:

            - **Upgrade-compatible across releases**: every build uses the same key, so future releases of the same variant install on top of older ones without `INSTALL_FAILED_UPDATE_INCOMPATIBLE`.
            - **Not a supply-chain claim**: anyone can produce APKs that match this signature. Suitable for personal sideload use, not for trust claims.
            - **One-time migration**: anyone who installed the previous `GameHub-6.0` build (signed with revanced-cli's auto-generated cert) will need to uninstall + reinstall once to switch to the testkey-signed build. After that, all future releases upgrade in place.

            ### Notes

            - The base APK is unmodified XiaoJi GameHub 6.0.0; only the bytecode/resources required by the patches above are touched.
            - The `.rvp` patch bundle and `.rve` extension files are also attached for use with `revanced-cli` directly.
          files: |
            apks/GameHub-6.0-Patched-*.apk
            shared/*.rvp
            shared/rve/*.rve
